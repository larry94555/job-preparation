skill: eval-batching-code
cases:
  - answer: >-
      tests_passed=true. Maintains active[] (≤batchSize) and a waiting queue; each step decrements every
      active request, splices out those at 0, then refills from waiting up to batchSize; returns the
      step count when active empties.
    expect:
      verdict: pass
      checks: { refills_on_completion: true, one_token_per_step: true, respects_batch_size: true, terminates_correctly: true }

  - answer: >-
      tests_passed=true, but processes the batch statically: it runs a whole batch to completion (max of
      the batch) before admitting any new request — no mid-batch refill.
    expect:
      verdict: fail
      checks: { refills_on_completion: false, one_token_per_step: true, respects_batch_size: true, terminates_correctly: true }

  - answer: >-
      tests_passed=true. Refills on completion and terminates, but admits all waiting requests at once,
      letting the active set exceed batchSize.
    expect:
      verdict: borderline
      checks: { refills_on_completion: true, one_token_per_step: true, respects_batch_size: false, terminates_correctly: true }
