# Expert canon (L3) — MemGPT/Letta memory paging and vector-store long-term memory.
- id: expert-memgpt
  type: multiple_choice
  tags: [types]
  difficulty: 3
  prompt: "What is the load-bearing idea of MemGPT / Letta (virtual context management)?"
  options:
    - { text: "Treat the finite context window like RAM and an external store like disk, paging memory between them as it becomes relevant or stale", correct: true }
    - { text: "Fine-tune the model on the whole conversation after every turn" }
    - { text: "Make the context window infinite so nothing ever has to be evicted" }
    - { text: "Store memory only in the system prompt and never write to an external store" }
  explanation: "MemGPT/Letta reframe the context window as one tier of a memory hierarchy the agent manages: evict older content to an external store when context fills, and page it back in when it becomes relevant again — the direct ancestor of the buffer-plus-external-store split."

- id: expert-vector-store
  type: multiple_choice
  tags: [memory]
  difficulty: 3
  prompt: "Why is a vector database the standard implementation of an agent's long-term memory?"
  options:
    - { text: "It embeds stored text and looks it up by semantic similarity, so the agent can recall a fact from a past session by meaning rather than by position in a transcript", correct: true }
    - { text: "It guarantees every stored memory is always correct and never becomes stale" }
    - { text: "It keeps all memory inside the context window so no retrieval is needed" }
    - { text: "It is the only place a short-term conversation buffer can be stored" }
  explanation: "Long-term recall across sessions is a semantic-lookup problem: text is embedded and retrieved by meaning. Vector stores (FAISS, pgvector, Pinecone, Chroma) are the standard home for that, distinct from the in-context short-term buffer."

- id: expert-paging-vs-window
  type: multiple_choice
  tags: [compression]
  difficulty: 3
  prompt: "In the MemGPT/Letta framing, when the context window fills, what is the correct move — and why is 'just use a bigger window' not the frontier answer?"
  options:
    - { text: "Evict older content to the external store and page it back in when it becomes relevant again — a bigger window only defers the overflow and still pays to carry stale content it does not need", correct: true }
    - { text: "Fine-tune the model on the overflowing context so it memorizes it and the window can be cleared" }
    - { text: "Delete the oldest content permanently, since anything evicted is never useful again" }
    - { text: "Stop the agent, because a full window is an unrecoverable error" }
  explanation: "Virtual context management treats the window as one tier of a hierarchy: evict to the external store, page back on relevance. A larger window raises the ceiling but still fills, and carrying content the step does not need wastes tokens (and KV-cache) — paging, not size, is the durable answer."

- id: expert-rag-vs-memory
  type: multiple_choice
  tags: [recall]
  difficulty: 3
  prompt: "How does an agent's long-term MEMORY differ from classic document RAG, even though both retrieve-then-inject from a vector store?"
  options:
    - { text: "RAG retrieves from a mostly-static external knowledge corpus; agent memory retrieves from a store the agent itself WROTE over prior sessions — its own facts, decisions, and preferences — so writing, staleness, and forgetting are first-class concerns", correct: true }
    - { text: "They are identical in every respect; 'agent memory' is just a rebranding of RAG with no real difference" }
    - { text: "RAG never uses embeddings, whereas agent memory always does" }
    - { text: "Agent memory keeps everything in the context window while RAG uses an external store" }
  explanation: "Both share the retrieve-then-inject mechanism, but RAG reads a curated, mostly-static knowledge base, while agent memory reads back what the agent itself recorded across sessions. That self-authored, evolving store is why write policy, staleness, and eviction/forgetting are central to memory but marginal to classic RAG."
