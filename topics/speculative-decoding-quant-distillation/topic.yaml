id: speculative-decoding-quant-distillation
title: "Speculative Decoding, Quantization & Distillation"
description: "Three distinct levers to make inference faster or cheaper — speculative decoding cuts latency losslessly, quantization shrinks memory and cost at a quality risk, and distillation trains a permanently smaller model. The skill is matching each lever to the right goal."
