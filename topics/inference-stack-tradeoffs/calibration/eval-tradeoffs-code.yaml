# Calibration for eval-tradeoffs-code.
# 'answer' summarizes the submitted approach + provided signals (the grader sees extracted evidence,
# not raw code). Exemplars target the SLO-config selector exercise.
skill: eval-tradeoffs-code
cases:
  - answer: >-
      tests_passed=true. filters_all_slos: discards every config whose latency>maxLatency,
      cost>maxCost, or quality<minQuality before ranking. ranks_by_quality: sorts the survivors by
      quality desc with a deterministic tie-break on cost asc then latency asc and returns the first.
      returns_null_none: returns null when the feasible set is empty. checks_all_three: evaluates
      latency, cost, and quality. signals.must_use=[filter before rank, three SLOs, null on empty];
      avoid=[].
    expect:
      verdict: pass
      checks: { filters_all_slos: true, ranks_by_quality: true, returns_null_none: true, checks_all_three: true }

  - answer: >-
      tests_passed=true. filters_all_slos: rejects any config violating latency, cost, or quality
      prior to ranking. ranks_by_quality: picks the highest-quality feasible config but breaks ties
      by insertion order instead of cost/latency, so the tie-break is non-deterministic.
      returns_null_none: returns null when nothing is feasible. checks_all_three: tests all three
      SLOs. signals.must_use=[filter before rank, three SLOs, null on empty];
      avoid=[order-dependent tie-break].
    expect:
      verdict: pass
      checks: { filters_all_slos: true, ranks_by_quality: false, returns_null_none: true, checks_all_three: true }

  - answer: >-
      tests_passed=true. filters_all_slos: skips filtering and ranks the full list, so it can return
      a config that busts the latency or cost budget. ranks_by_quality: sorts by quality desc and
      returns the top one. returns_null_none: never returns null since it always emits the
      highest-quality config even when none is feasible. checks_all_three: only inspects quality.
      signals.must_use=[filter before rank, null on empty]; avoid=[rank without filtering].
    expect:
      verdict: fail
      checks: { filters_all_slos: false, ranks_by_quality: true, returns_null_none: false, checks_all_three: true }

  - answer: >-
      tests_passed=true. filters_all_slos: computes all three SLO comparisons but combines them with
      OR instead of AND, so a config that meets any one budget survives even while violating another
      and can be selected. ranks_by_quality: sorts survivors by quality desc with a cost/latency
      tie-break. returns_null_none: returns null when no config satisfies the (too-loose) predicate.
      checks_all_three: evaluates latency, cost, and quality. signals.must_use=[rank by quality, null
      on empty, three SLOs]; avoid=[OR-combined constraints].
    expect:
      verdict: borderline
      checks: { filters_all_slos: false, ranks_by_quality: true, returns_null_none: true, checks_all_three: true }
