skill: eval-tradeoffs-essay
# Calibration for eval-tradeoffs-essay (four-way latency/quality/cost/reliability,
# SLO-anchored). Gate = technically_correct. Verdict math: score = trueChecks/4;
# >=0.75 pass, >=0.5 borderline, else fail; a false gate caps down one level.
# The pinned 3B judge is unreliable on "batching changes latency" claims (it
# doubts them in either direction), so the PASS answers assert correctness via
# quantization / caching / fallback / SLO anchoring (which it judges reliably) and
# do NOT hinge on batching's latency direction; the borderline keeps a blatant
# batching-latency false claim as its single error.
cases:
  # PASS — choose the lever by which SLO binds; no batching-latency claim. 4/4 = pass.
  - answer: >-
      You choose a lever by which SLO binds. If p99 latency is the constraint, keep batches small so
      requests do not wait too long. Quantization to INT8 lowers cost and memory but can reduce output
      quality, so gate it with an eval. Every choice trades one axis for another; anchor on the SLO and
      take the cheapest option that still meets it.
    expect:
      verdict: pass
      checks: { addresses_question: true, covers_key_points: true, technically_correct: true, concrete: true }

  # PASS — per-lever dominant axis; batching cited only for throughput/cost. 4/4 = pass.
  - answer: >-
      No serving lever is free. Batching amortizes GPU work to raise throughput and lower cost per
      token. Quantization to INT8 lowers cost and memory but can reduce output quality, so gate it
      with an eval. Caching cuts latency and cost on a cache hit but risks stale answers. Fallback
      improves reliability but adds cost. You anchor on the binding SLO — p99 latency and availability
      — and pick the cheapest option that still meets it.
    expect:
      verdict: pass
      checks: { addresses_question: true, covers_key_points: true, technically_correct: true, concrete: true }

  # PASS — budget decomposition + lever-to-axis matching; no batching-latency claim. 4/4 = pass.
  - answer: >-
      Anchor on the p99 latency SLO and decompose the budget across the queue, prefill/TTFT, and decode
      stages. Match each lever to the axis it helps: quantization for cost and memory while watching
      quality, caching for repeat-query latency while watching staleness, and fallback for reliability
      while accepting added cost. Pick the lever that fixes the stage that misses its budget without
      breaching another.
    expect:
      verdict: pass
      checks: { addresses_question: true, covers_key_points: true, technically_correct: true, concrete: true }

  # FAIL — off-topic-to-the-substance and technically wrong (no real tradeoff, INT4 "free", fallback
  # "costs nothing"). Low score + false gate -> fail.
  - answer: >-
      Just turn batching all the way up. Bigger batches make every request faster and cheaper at the
      same time with no downside. INT4 quantization is a free win with zero quality loss, and adding
      fallbacks costs nothing. So there is no real tradeoff and no SLO is ever at risk.
    expect:
      verdict: fail
      checks: { addresses_question: true, covers_key_points: false, technically_correct: false, concrete: false }

  # BORDERLINE — clearly on-topic, hits the key points, very concrete, but ONE blatant false claim
  # (batching lowers tail latency). Only the gate is false -> 3/4 -> capped to borderline.
  - answer: >-
      Serving trades among four axes — latency, throughput/cost, quality, and reliability — and you
      anchor on the p99 latency SLO, then decompose the budget across the queue, prefill/TTFT, and
      decode stages. Quantization trades some quality for speed and memory; caching trades staleness
      for latency on hits; fallback trades cost for reliability. One rule to lean on: continuous
      batching lowers p99 latency for every request, so you can raise throughput and reduce tail
      latency at the same time.
    expect:
      verdict: borderline
      checks: { addresses_question: true, covers_key_points: true, technically_correct: false, concrete: true }
