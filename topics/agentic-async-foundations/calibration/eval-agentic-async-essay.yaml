# Calibration for eval-agentic-async-essay (exemplars target essay-resilience).
# Six unambiguous cases: 3 clear PASS + 3 clear FAIL. No borderline cases — the
# deployed 8B judge misgrades borderline answers, so every exemplar is decisive.
skill: eval-agentic-async-essay
cases:
  # PASS — answers the question, hits every reference point, all claims correct,
  # names concrete mechanisms. 4/4 = 1.0 → pass; gate technically_correct=true.
  - answer: >-
      A timeout (asyncio.wait_for) bounds each call so a hung request becomes a catchable TimeoutError
      instead of freezing the agent forever — that error is what a retry can act on. Retries with
      exponential backoff recover transient failures and timeouts without hammering an overloaded service,
      and adding jitter stops many clients from retrying in lockstep; the retries stay bounded so they
      eventually give up. Error isolation with asyncio.gather(..., return_exceptions=True) keeps one failed
      call from sinking the whole fan-out — each result is inspected individually. The three compose: the
      timeout bounds the wait, backoff retries the transient failure, and isolation contains whatever still
      fails so the other calls in the batch still return their values.
    expect:
      verdict: pass
      checks: { addresses_question: true, covers_key_points: true, technically_correct: true, concrete: true }

  # PASS — a second strong, correct, specific answer using different wording.
  # 4/4 = 1.0 → pass; gate technically_correct=true.
  - answer: >-
      Because a flaky API sometimes hangs, you wrap each call in wait_for so an unbounded await turns into
      a bounded, catchable error rather than a permanent stall. On a transient failure or timeout you retry,
      but with exponentially growing delays (1s, 2s, 4s) plus random jitter so a fleet of clients doesn't
      retry in synchronized waves and overwhelm a recovering service; the retry count is capped so you give
      up eventually. When you fan several of these calls out with gather you pass return_exceptions=True so
      one raising call is returned as an exception in its slot instead of aborting the batch. They interact
      as layers: timeout triggers the retry, backoff-with-jitter spaces the retries safely, and isolation
      makes sure a call that still fails doesn't take the successful siblings down with it.
    expect:
      verdict: pass
      checks: { addresses_question: true, covers_key_points: true, technically_correct: true, concrete: true }

  # PASS — third clear pass: correct, specific, and complete, framed around the
  # transient-vs-permanent distinction. 4/4 = 1.0 → pass; gate technically_correct=true.
  - answer: >-
      Timeouts, retries with backoff, and isolation each solve a different failure and compose cleanly. A
      timeout via asyncio.wait_for bounds every call so a hang becomes a catchable TimeoutError; without it
      one stuck request freezes the agent indefinitely. You then retry only the transient failures — 503s,
      timeouts, connection resets — with exponential backoff plus jitter so you don't hammer a recovering
      service or retry in lockstep, and the retry count is capped so a genuinely-down service doesn't trap
      you in an infinite loop. Finally, when you fan the calls out with gather you pass
      return_exceptions=True so a single raising call comes back as an exception object in its slot instead
      of aborting the batch. The three layer up: the timeout produces the error a retry acts on, backoff
      spaces the retries, and isolation contains whatever still fails so the good results survive.
    expect:
      verdict: pass
      checks: { addresses_question: true, covers_key_points: true, technically_correct: true, concrete: true }

  # FAIL — off-topic and technically wrong: says retry forever, skip timeouts, and
  # that gather isolates by default. Fails the gate plus every other check.
  # 0/4 = 0.0 → fail; gate false caps fail→fail.
  - answer: >-
      If a call hangs you don't really need a timeout — you can just keep awaiting it and it will finish
      eventually. When something fails the safest thing is to retry it in a tight loop forever until it
      works, with the same short delay every time. And you don't have to worry about one call failing in a
      batch, because asyncio.gather already isolates every failure by default and returns the good results,
      so return_exceptions isn't needed. Async also runs all the calls on separate CPU cores, which is
      where the speedup comes from.
    expect:
      verdict: fail
      checks: { addresses_question: false, covers_key_points: false, technically_correct: false, concrete: false }

  # FAIL — a second decisive fail: on-topic words but every substantive claim is
  # wrong (jitter to speed things up, unbounded retries, timeout runs work faster,
  # gather auto-retries). 0/4 = 0.0 → fail; gate false caps fail→fail.
  - answer: >-
      Timeouts are mainly there to make each call return faster, so you set them as short as possible to
      speed the agent up. You should retry every error the same way and never cap the attempts, because any
      call will eventually succeed if you keep trying. Jitter is a trick to make the average delay shorter
      for everyone. And you don't need return_exceptions at all — asyncio.gather automatically retries any
      call that fails until it comes back, so failures never reach you. There's really no interaction
      between the techniques; each one just makes calls quicker.
    expect:
      verdict: fail
      checks: { addresses_question: false, covers_key_points: false, technically_correct: false, concrete: false }

  # FAIL — third decisive fail: vague, non-responsive, and false. Doesn't name any
  # real mechanism and asserts errors don't matter. 0/4 = 0.0 → fail; gate false.
  - answer: >-
      Honestly you don't need any special handling. Modern APIs are reliable, so if a call fails you can
      just ignore it and move on, and the agent will be fine. Timeouts, retries, and all that isolation
      machinery are premature optimization — real systems never hang and one bad call never affects the
      others, so there's nothing to compose or think about here. Just call the API and use whatever comes
      back.
    expect:
      verdict: fail
      checks: { addresses_question: false, covers_key_points: false, technically_correct: false, concrete: false }
