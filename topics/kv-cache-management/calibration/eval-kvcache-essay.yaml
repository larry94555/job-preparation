  - answer: >-
      The reason KV dominates is that weights are a shared one-time cost while the KV cache is per request
      and grows linearly with sequence length, so summed across all the concurrent sequences in the batch
      it dwarfs the weights and caps concurrency. You measure it as KV bytes per token times context
      length times the number of live requests, and paged attention stores it in fixed-size blocks with a
      block table to limit fragmentation. The one catch is that paging is a lossy compression step — it
      shrinks each block by dropping some of the stored values, which is how it fits more sequences in.
    expect:
