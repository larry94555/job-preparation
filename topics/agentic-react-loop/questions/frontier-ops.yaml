# Frontier drill (L4) — reliability of long-horizon single-agent loops.
- id: frontier-agent-reliability
  type: multiple_choice
  tags: [guardrails]
  difficulty: 4
  prompt: >-
    A single agent runs a long-horizon ReAct loop over dozens of steps. Its reliability collapses as the
    horizon grows: an early wrong observation or a misread tool result compounds, and the agent neither
    finishes nor recovers. Which named open problem is this, and what is the honest read?
  options:
    - { text: "Reliability and error recovery in long-horizon single-agent loops — an open problem: errors compound silently across steps, and guardrails (step cap, can't-finish, logging, output validation) bound the damage but do not guarantee recovery", correct: true }
    - { text: "It is fully solved by raising the max-steps cap so the loop has more room" }
    - { text: "It is only a latency problem; a faster model makes a long loop correct" }
    - { text: "It is not a real problem — a single step never fails, so a long loop of them never does either" }
  explanation: >-
    Keeping a single agent reliable across a long horizon is a genuine frontier problem: one bad
    observation or misstep compounds over the following steps, and without recovery the agent drifts.
    Guardrails — a step cap, a can't-finish path, per-step logging, and validating observations — bound and
    surface the failure, but they do not by themselves guarantee the agent recovers. A bigger cap or a
    faster model does not close the gap.
