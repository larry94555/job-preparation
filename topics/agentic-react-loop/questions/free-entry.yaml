# Conceptual multiple choice (formerly short-answer free entry)
- id: fe-react-expand
  type: multiple_choice
  tags: [react]
  difficulty: 2
  prompt: "In a ReAct step, what does the Act phase concretely consist of?"
  options:
    - { text: "Calling a chosen tool with an input the reasoning selected, so the world (not the model) produces the next result", correct: true }
    - { text: "Writing the final answer and exiting the loop" }
    - { text: "Re-reading the original prompt and summarizing it" }
    - { text: "Predicting what a tool would return without actually running it" }
  explanation: "Act is where reasoning turns into a concrete tool invocation: the agent picks a tool and its input, the tool runs for real, and its output becomes the observation the agent reasons over next."

- id: fe-observe
  type: multiple_choice
  tags: [react]
  difficulty: 2
  prompt: "What distinguishes an Observation from a Thought in a ReAct trace?"
  options:
    - { text: "An Observation is external content produced by running a tool; a Thought is the model's own reasoning", correct: true }
    - { text: "They are the same thing written on two lines for readability" }
    - { text: "A Thought comes from the tool and an Observation comes from the model" }
    - { text: "An Observation is always the final answer and a Thought never is" }
  explanation: "The Thought is what the model generates internally to decide what to do; the Observation is the real result the environment returns after the action. Keeping them distinct is what grounds the loop in reality."

- id: fe-step-limit
  type: multiple_choice
  tags: [guardrails]
  difficulty: 2
  prompt: "In a healthy run, how often should the max-steps cap be the thing that actually stops the loop?"
  options:
    - { text: "Rarely — the agent should normally stop by emitting a final answer well before the cap, which exists only as a backstop", correct: true }
    - { text: "Every run — the cap is the primary and intended stopping condition" }
    - { text: "Exactly half the time, to balance speed and accuracy" }
    - { text: "Never — a correct loop cannot reach the cap under any circumstances" }
  explanation: "The normal stopping condition is the agent deciding it can answer and returning a final. The cap is a safety net for the abnormal case where it never does — so hitting it should be the exception, not the rule."

- id: fe-log
  type: multiple_choice
  tags: [guardrails]
  difficulty: 2
  prompt: "When is per-step logging of the loop most valuable?"
  options:
    - { text: "When diagnosing a run that went wrong — the trace of thought, action, and observation shows exactly where the agent drifted", correct: true }
    - { text: "Only while the loop is still running, to speed up the current step" }
    - { text: "When you want to replace the max-steps cap with something cheaper" }
    - { text: "Only for successful runs, since failures leave nothing worth recording" }
  explanation: "A loop is otherwise opaque. The per-step record of what the agent reasoned, called, and observed is what lets you reconstruct a failed run and pinpoint the step where it went off track."

- id: fe-loop
  type: multiple_choice
  tags: [loop]
  difficulty: 1
  prompt: "What are the two ways a ReAct loop can terminate?"
  options:
    - { text: "The agent emits a final answer (the normal case), or the max-steps cap is reached (the backstop)", correct: true }
    - { text: "The user types 'stop', or the model runs out of tokens" }
    - { text: "A fixed timer expires, or a second agent halts it" }
    - { text: "It never terminates on its own; it must always be killed externally" }
  explanation: "In a healthy run the agent decides it can answer and returns a final, ending the loop. If it never does, the max-steps cap trips as a bounded fallback. Those are the two exits."

- id: fe-validate
  type: multiple_choice
  tags: [validation]
  difficulty: 2
  prompt: "What is the risk of feeding an unvalidated, malformed observation back into the loop?"
  options:
    - { text: "The agent reasons over garbage, so a bad tool result corrupts its very next decision", correct: true }
    - { text: "None — the model automatically ignores any observation that looks wrong" }
    - { text: "The loop speeds up because malformed observations are shorter" }
    - { text: "The tool is retried automatically without the agent ever seeing the bad result" }
  explanation: "The agent trusts whatever observation it is given. If an empty or malformed result slips back in, the next Thought reasons over it as if it were real, and the corruption propagates through the rest of the run."
