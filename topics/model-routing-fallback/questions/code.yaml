# Coding exercise — engine type: code (graded by tests + concept skill)
- id: code-router
  type: code
  language: typescript
  tags: [fallback]
  difficulty: 4
  prompt: >-
    Implement a `Router` class. `constructor(failureThreshold)`. `run(providers)` takes an ordered
    list of `{ name, call }` (call() may throw). Try providers in order, SKIPPING any whose
    consecutive-failure count has reached the threshold (breaker open). On success, reset that
    provider's failures and return `{ ok:true, provider, value }`. On throw, increment its failures
    and continue. If none succeed, return `{ ok:false, error:"all_failed" }`.
  starter_file: exercises/router/starter.ts
  test_file: exercises/router/solution.test.ts
  test_command: "npm test"
  runner_image: "quiz-runner-node:20"
  timeout_sec: 30
  eval_skill: eval-routing-code
  concept_checks:
    must_use: ["try providers in order", "fall through on error to the next", "circuit breaker skips a provider after threshold failures"]
    avoid_antipattern: ["throwing instead of returning all_failed", "no breaker (retrying a dead provider every time)"]
