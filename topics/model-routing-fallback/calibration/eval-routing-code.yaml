      verdict: pass
      checks: { fallback_on_error: true, tries_in_order: true, breaker_skips_open: true, returns_all_failed: true }

  - answer: >-
      tests_passed=true, but only calls the first provider and rethrows if it fails — no fallback to the
      next provider at all.
    expect:
      verdict: fail
      checks: { fallback_on_error: false, tries_in_order: true, breaker_skips_open: false, returns_all_failed: false }

  - answer: >-
      tests_passed=true. Tries providers in order, falls through on error, and returns all_failed, but
