# Calibration for eval-safety-code.
# 'answer' summarizes the submitted approach + provided signals (the grader sees extracted evidence,
# not raw code). Exemplars target the authorization / confused-deputy exercise.
skill: eval-safety-code
cases:
  # Case 1 — PASS (4/4 = 1.0; gate true). Full confused-deputy defense across the trust boundary.
  - answer: >-
      tests_passed=true. Blocks untrusted high-risk: returns {allowed:false} when policy.highRisk
      includes the tool AND provenance==="untrusted" AND !confirmed, closing the confused-deputy hole.
      Allows trusted high-risk: a high-risk action whose provenance is "trusted" (the user asked for it)
      passes. Allows untrusted low-risk: reads and other low-risk tools from untrusted input are allowed
      because they cannot egress or mutate. Confirmation overrides: an untrusted high-risk action with
      confirmed===true is let through on independent user confirmation.
      signals.must_use=[provenance check, high-risk gate, independent confirmation]; avoid=[].
    expect:
      verdict: pass
      checks: { blocks_untrusted_high_risk: true, allows_trusted_high_risk: true, allows_untrusted_low_risk: true, confirmation_overrides: true }

  # Case 2 — PASS (3/4 = 0.75; gate true; one non-gate false). Secure default, no confirmation path.
  - answer: >-
      tests_passed=true. Blocks untrusted high-risk: correctly denies high-risk tools when provenance is
      "untrusted", so the injection / confused-deputy case is stopped. Allows trusted high-risk: trusted
      high-risk requests pass. Allows untrusted low-risk: untrusted low-risk reads are permitted. No
      confirmation override: the function ignores the confirmed flag entirely, so a legitimately confirmed
      untrusted high-risk action stays blocked (over-strict on that one path, but never unsafe).
      signals.must_use=[provenance check, high-risk gate]; avoid=[confirmation ignored].
    expect:
      verdict: pass
      checks: { blocks_untrusted_high_risk: true, allows_trusted_high_risk: true, allows_untrusted_low_risk: false, confirmation_overrides: true }

  # Case 3 — FAIL (1/4 = 0.25; gate FALSE caps a fail to fail). Trust boundary not enforced.
  - answer: >-
      tests_passed on some cases, but does NOT block untrusted high-risk: it returns allowed:true for
      high-risk tools regardless of provenance, leaving the confused-deputy / egress hole wide open (the
      gate fails). Allows trusted high-risk: trusted high-risk still passes. Does not allow untrusted
      low-risk cleanly — it blocks harmless untrusted reads by mistake. No confirmation override: the
      confirmed flag is never read, so confirmation cannot rescue a blocked action.
      signals.must_use=[]; avoid=[no provenance gate, untrusted high-risk allowed to egress].
    expect:
      verdict: fail
      checks: { blocks_untrusted_high_risk: false, allows_trusted_high_risk: true, allows_untrusted_low_risk: false, confirmation_overrides: false }

  # Case 4 — BORDERLINE (2/4 = 0.5; gate true so no cap). Over-strict: blocks all high-risk.
  - answer: >-
      tests_passed on most cases. Blocks untrusted high-risk: yes — the untrusted high-risk case is
      stopped, so the gate holds. But it blocks ALL high-risk actions regardless of provenance, so it does
      not allow trusted high-risk (rejects legitimate user-requested actions). Allows untrusted low-risk:
      untrusted low-risk reads are permitted. No confirmation override: the confirmed flag is ignored, so
      confirmation cannot unblock anything.
      signals.must_use=[high-risk gate]; avoid=[blanket high-risk block, confirmation ignored].
    expect:
      verdict: borderline
      checks: { blocks_untrusted_high_risk: true, allows_trusted_high_risk: false, allows_untrusted_low_risk: true, confirmation_overrides: false }
