# Multiple choice
- id: mc-talk-vs-act
  type: multiple_choice
  tags: [toolloop]
  difficulty: 2
  prompt: "What is the difference between a model that only produces text and one wired for tool calling?"
  options:
    - { text: "A talking model is a chatbot; a model that can call tools to act on the world is an agent", correct: true }
    - { text: "There is none — tool calling is just a longer prompt" }
    - { text: "A talking model is always more accurate because it never touches external state" }
    - { text: "An agent is simply a model with a bigger context window" }
  explanation: "A model that can only emit text is a chatbot. The moment it can request tools that read or change the world — and a harness runs them — it becomes an agent."

- id: mc-stop-reason
  type: multiple_choice
  tags: [toolloop]
  difficulty: 2
  prompt: "The model returns with `stop_reason == \"tool_use\"`. What does that tell the harness?"
  options:
    - { text: "The model wants a tool run; the loop must execute it and call the model again", correct: true }
    - { text: "The conversation is finished and the final text is ready" }
    - { text: "The model failed and the request should be retried unchanged" }
    - { text: "The harness should return the raw tool block to the end user" }
  explanation: "`tool_use` means the turn ended because the model requested a tool. The loop runs the tool, feeds the result back, and calls the model again — it does not stop."

- id: mc-tool-result-role
  type: multiple_choice
  tags: [toolloop]
  difficulty: 3
  prompt: "After the harness runs a tool, how is the output returned to the model?"
  options:
    - { text: "As a user-role message containing a tool_result block", correct: true }
    - { text: "As a new system prompt prepended to the conversation" }
    - { text: "As an assistant-role message so the model thinks it said it" }
    - { text: "It is not returned; the model infers the result from context" }
  explanation: "Tool output goes back as a user-role message whose content is a tool_result block. That is the channel the loop uses to feed execution results into the next model turn."

- id: mc-tool-schema-why
  type: multiple_choice
  tags: [schema]
  difficulty: 2
  prompt: "Why give a tool a typed `input_schema` rather than accepting free-form arguments?"
  options:
    - { text: "So the harness can validate and coerce the model's arguments against the contract before executing", correct: true }
    - { text: "So the model runs faster at inference time" }
    - { text: "So the tool never needs any error handling" }
    - { text: "So the system prompt can be shorter" }
  explanation: "A typed input_schema is a contract: the harness checks the model's proposed arguments against it, coerces types, and rejects malformed calls before any side effect happens."

- id: mc-required-field
  type: multiple_choice
  tags: [schema]
  difficulty: 2
  prompt: "What does the `required` list in a tool's input_schema do?"
  options:
    - { text: "It names the arguments the model must supply; the harness rejects a call that omits any of them", correct: true }
    - { text: "It ranks arguments by how often the model uses them" }
    - { text: "It tells the model which arguments are optional and safe to skip" }
    - { text: "It makes every argument default to null when missing" }
  explanation: "`required` is the schema's list of mandatory arguments. A call missing one fails validation, so the harness rejects it instead of running the tool with a hole in its input."

- id: mc-pydantic-why
  type: multiple_choice
  tags: [structured]
  difficulty: 3
  prompt: "Why parse the model's JSON into a Pydantic model instead of using the dict directly?"
  options:
    - { text: "Parsing plus validation makes bad output fail loudly at the boundary instead of corrupting state silently downstream", correct: true }
    - { text: "Pydantic makes the model emit JSON faster" }
    - { text: "A Pydantic model removes the need to prompt for JSON at all" }
    - { text: "It guarantees the model can never return invalid JSON" }
  explanation: "Validating into a typed model turns a malformed or out-of-range field into an immediate, localized error — far better than a wrong value flowing silently into the rest of the program."

- id: mc-validate-not-trust
  type: multiple_choice
  tags: [structured]
  difficulty: 2
  prompt: "The model returns a JSON string that looks correct. What should you do with it?"
  options:
    - { text: "Never trust the raw string — validate it against a schema before using any field", correct: true }
    - { text: "Trust it; if it parses as JSON the values are guaranteed correct" }
    - { text: "Use it directly and only validate if a later step crashes" }
    - { text: "Ask the model whether its own output is valid" }
  explanation: "Well-formed JSON is not correct JSON: fields can be missing, the wrong type, or out of range. Always validate the parsed object against the schema before trusting any value."

- id: mc-json-mode
  type: multiple_choice
  tags: [structured]
  difficulty: 3
  prompt: "What does a JSON-schema / `response_format` structured-outputs mode give you?"
  options:
    - { text: "It constrains decoding so the model's output is guaranteed to match the JSON schema", correct: true }
    - { text: "It speeds up token generation by skipping punctuation" }
    - { text: "It lets the model return prose that you parse with a regex later" }
    - { text: "It replaces the need to define a schema at all" }
  explanation: "Structured-outputs / JSON-schema mode constrains the decoder to only emit tokens consistent with the schema, so the returned text is guaranteed to parse and match — you no longer hope the model returns valid JSON."

- id: mc-wrong-tool-recover
  type: multiple_choice
  tags: [recovery]
  difficulty: 3
  prompt: "The model emits a call to a tool that is malformed or not registered. The harness should:"
  options:
    - { text: "Return a structured error the model can read, not crash the loop", correct: true }
    - { text: "Throw an unhandled exception and end the session" }
    - { text: "Guess the closest real tool and run that instead" }
    - { text: "Silently drop the call and continue with no feedback" }
  explanation: "A bad tool call is expected input, not a fatal event. Return a structured, model-facing error so the loop stays alive; never crash, guess, or drop silently."

- id: mc-loop-continues
  type: multiple_choice
  tags: [recovery]
  difficulty: 3
  prompt: "You have returned a structured error for a bad tool call. Why feed it back into the loop?"
  options:
    - { text: "So the model can read the error and self-correct with a fixed call on the next turn", correct: true }
    - { text: "So the user has to fix the arguments manually" }
    - { text: "Errors should never be shown to the model; feeding it back leaks internals" }
    - { text: "To pad the context so the model slows down and is more careful" }
  explanation: "The error is only useful if the model sees it. Feeding a model-facing error back turns a failed call into a self-correcting step: the model reads what was wrong and retries correctly."

- id: mc-tool-use-id
  type: multiple_choice
  tags: [toolloop]
  difficulty: 3
  prompt: "The model fires several tool calls in one turn. What lets the harness attach each tool_result to the right call?"
  options:
    - { text: "The tool_use_id — each tool_result carries the id of the tool_use block it answers", correct: true }
    - { text: "The order of the results; the model always reads them positionally" }
    - { text: "The tool_name, which is unique per turn by protocol" }
    - { text: "Nothing — a turn may only ever contain one tool call" }
  explanation: "Each tool_result echoes the tool_use_id of the request that produced it. When one turn contains multiple tool_use blocks, that id — not position or name — is what binds each result back to the correct call."

- id: mc-step-cap-why
  type: multiple_choice
  tags: [toolloop]
  difficulty: 3
  prompt: "Why cap the tool-use loop at a fixed number of steps?"
  options:
    - { text: "A model that keeps requesting tools (or loops between two) would otherwise run forever; a cap turns that into a bounded, observable failure", correct: true }
    - { text: "The API rejects any conversation longer than ten messages" }
    - { text: "A cap makes each individual tool call return faster" }
    - { text: "Without a cap the model cannot emit end_turn at all" }
  explanation: "A cap bounds the loop so a misbehaving model can't spin indefinitely. Hitting the cap is an explicit, observable failure you can log and handle — not silent infinite work."

- id: mc-end-turn
  type: multiple_choice
  tags: [toolloop]
  difficulty: 2
  prompt: "The model returns with `stop_reason == \"end_turn\"`. What should the loop do?"
  options:
    - { text: "Stop looping and return the model's final .text — the turn is complete", correct: true }
    - { text: "Run one more tool just in case the model forgot" }
    - { text: "Retry the request because end_turn signals an error" }
    - { text: "Append an empty tool_result and call the model again" }
  explanation: "`end_turn` means the model is finished and its .text is the answer. Unlike tool_use, which means continue, end_turn is the loop's exit condition."

- id: mc-schema-description
  type: multiple_choice
  tags: [schema]
  difficulty: 3
  prompt: "Beyond types and `required`, why do the natural-language `description` fields in a tool schema matter?"
  options:
    - { text: "The model reads them to decide when and how to call the tool; a vague description leads to misuse even when the types are correct", correct: true }
    - { text: "They are stripped before the request, so they have no effect" }
    - { text: "They replace the need for a required list" }
    - { text: "They are only shown to human developers, never to the model" }
  explanation: "The model uses the schema — including each description — as its instructions for the tool. Precise descriptions guide correct selection and argument-filling; a typed schema with vague prose still gets called wrong."

- id: mc-harness-untrusting
  type: multiple_choice
  tags: [schema]
  difficulty: 3
  prompt: "Why treat the harness as an 'untrusting executor' of the model's tool calls?"
  options:
    - { text: "The model is the caller and can propose malformed or hallucinated calls; the harness validates every call against the contract before any side effect", correct: true }
    - { text: "The model is trusted, so the harness only logs calls without checking them" }
    - { text: "Untrusting means the harness re-runs each tool twice to be safe" }
    - { text: "It means the harness ignores the schema and runs whatever the model sends" }
  explanation: "The model proposes; the harness disposes. Because a proposed call can be malformed or hallucinated, the harness checks it against the typed contract first and only executes calls that pass — that is what 'untrusting executor' means."

- id: mc-shape-vs-semantics
  type: multiple_choice
  tags: [structured]
  difficulty: 4
  prompt: "Structured-outputs mode already guarantees the JSON matches the schema. Why still run a Pydantic validator on the result?"
  options:
    - { text: "Constrained decoding guarantees the shape, but not semantics the schema can't express — a confidence in [0,1], a non-empty list; validation enforces those", correct: true }
    - { text: "Because structured-outputs mode frequently returns unparseable JSON anyway" }
    - { text: "Pydantic re-runs the decoder to double-check each token" }
    - { text: "There is no reason; validation after structured outputs is pure redundancy" }
  explanation: "The two layers are complementary. Structured-outputs mode guarantees a parseable object of the right shape; a validator enforces value-level semantics (ranges, non-empty constraints, cross-field rules) the schema cannot fully capture."

- id: mc-fail-loudly
  type: multiple_choice
  tags: [structured]
  difficulty: 2
  prompt: "What is the benefit of validating model JSON at the boundary and raising immediately on a bad field?"
  options:
    - { text: "A malformed or out-of-range field becomes an immediate, localized error instead of corrupting state far downstream", correct: true }
    - { text: "It makes the model emit fewer tokens" }
    - { text: "It guarantees the model never returns a bad field again" }
    - { text: "It lets you skip defining the expected shape" }
  explanation: "Failing loudly at the boundary localizes the error to where the bad value entered. Without it, a wrong value flows silently into later steps and surfaces as a confusing failure far from its cause."

- id: mc-default-antipattern
  type: multiple_choice
  tags: [recovery]
  difficulty: 3
  prompt: "A tool call is missing a required argument. Why is silently filling in a default the wrong recovery?"
  options:
    - { text: "It executes the tool on a value the model never chose, hiding the error and risking a wrong side effect; validation should reject and let the model resupply the field", correct: true }
    - { text: "Defaults are impossible to compute for any argument type" }
    - { text: "It makes the tool run slower than rejecting would" }
    - { text: "The API forbids any tool from having default values" }
  explanation: "A silent default runs the tool on an argument the model didn't provide, masking the mistake and possibly triggering a wrong action. The safe path is to reject with a model-facing error so the model resupplies the field itself."

- id: mc-hallucinated-name
  type: multiple_choice
  tags: [recovery]
  difficulty: 3
  prompt: "The model calls a tool whose name is not in the registry. What is the correct classification and response?"
  options:
    - { text: "Treat it as a hallucinated call: reject with a structured unknown_tool error and feed it back — do not guess the closest real tool", correct: true }
    - { text: "Run whichever registered tool has the most similar name" }
    - { text: "Assume the registry is stale and register the new name automatically" }
    - { text: "Crash the loop so a human can investigate the unknown name" }
  explanation: "An unregistered name is a hallucinated call. The harness returns a structured unknown_tool error the model can read and correct from — never guessing a similar tool, auto-registering, or crashing."

- id: mc-parse-then-validate
  type: multiple_choice
  tags: [structured]
  difficulty: 2
  prompt: "What is the correct order of operations for handling a model's JSON string response?"
  options:
    - { text: "Parse the string into an object, then validate that object's fields against the schema before using any value", correct: true }
    - { text: "Use the raw string directly and parse only if a later step fails" }
    - { text: "Validate the raw string as text, then never parse it" }
    - { text: "Ask the model to confirm its own JSON is valid, then trust it" }
  explanation: "Parse-then-validate: first turn the string into an object, then check every field's type and constraints. Using the raw string or trusting the parse alone lets missing keys and out-of-range values slip through."
