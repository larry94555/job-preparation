# Frontier drill (L4) — open problems in agent tool use.
- id: frontier-multitool
  type: multiple_choice
  tags: [toolloop]
  difficulty: 4
  prompt: >-
    A frontier agent chains a dozen tools per task and its reliability collapses as the sequence grows,
    with arguments occasionally grounded in hallucinated rather than real state. Which named open problem
    is this, and what is the honest read?
  options:
    - { text: "Reliable multi-tool orchestration and robust argument grounding at scale — an open problem: orchestration failures are silent and compound, and typed contracts are necessary but not sufficient", correct: true }
    - { text: "It is fully solved by sending every tool schema on every request" }
    - { text: "It is a latency problem; a faster model makes long tool chains correct" }
    - { text: "It is not a real problem — a single tool call never fails, so chains of them never do either" }
  explanation: >-
    Keeping a long tool sequence correct (multi-tool orchestration) while every argument stays tied to
    real state (argument grounding) is a genuine frontier open problem: failures across a chain are silent
    and compound, and a typed contract validates shape but cannot guarantee the argument is grounded in
    reality. Larger schemas or faster models do not close it.

- id: frontier-reliability-at-scale
  type: multiple_choice
  tags: [recovery]
  difficulty: 4
  prompt: >-
    Running tool loops across many tools, many turns, and many concurrent agents surfaces distributed-systems
    edges. Which is the honest, frontier-aware read of "reliability at scale" for agent tool use?
  options:
    - { text: "Partial failures, retries that double-apply side effects, and orchestration that must stay correct under load are the active research edge — a single validated call is no longer the whole story, and neither a bigger schema nor a faster model closes the gap", correct: true }
    - { text: "It is fully solved by wrapping every tool call in an automatic retry" }
    - { text: "It is purely a hardware problem: add GPUs and the loops become correct" }
    - { text: "Concurrency is irrelevant because each agent runs in perfect isolation with no shared effects" }
  explanation: >-
    At scale the tool loop meets classic distributed-systems failure modes: partial failures, retries that
    double-apply an effect (non-idempotent side effects), and orchestration that must remain correct under
    concurrent load. These are an open research edge, not a solved problem — validate-and-recover on one call
    is necessary but not sufficient, and more compute or larger schemas do not close it.
