# Calibration for eval-agentic-tools-essay (exemplars target essay-validate-recover).
skill: eval-agentic-tools-essay
cases:
  # PASS — answers the question, hits every reference point, all claims correct,
  # names concrete mechanisms. 4/4 = 1.0 → pass; gate technically_correct=true.
  - answer: >-
      An unregistered tool name is a hallucinated call, so the harness rejects it instead of guessing the
      closest real tool — it returns a structured error like {"ok": false, "error": "unknown_tool"} rather
      than raising. The known tool with a missing required field fails schema validation before the handler
      runs, so it never executes on garbage input; the harness returns {"ok": false, "error":
      "invalid_args"} and does not silently default or coerce the field. In both cases the structured,
      model-facing error is fed back into the loop as a tool_result so the model reads exactly what was
      wrong and retries with a corrected call on the next turn. Nothing crashes and no unvalidated input
      ever reaches a tool.
    expect:
      verdict: pass
      checks: { addresses_question: true, covers_key_points: true, technically_correct: true, concrete: true }

  # PASS — a second strong, correct, specific answer using different wording.
  # 4/4 = 1.0 → pass; gate technically_correct=true.
  - answer: >-
      For the unknown tool, the dispatcher looks it up in the registry, finds nothing, and returns an
      error object naming the problem instead of throwing or running some similarly named tool — an
      unregistered name is a hallucinated call and must not execute. For the call missing a required
      field, validation against the tool's input_schema fails before the handler is invoked, so the
      harness reports invalid_args and refuses to default the field or blindly coerce a type. Both errors
      are model-facing and go back into the conversation as a tool_result, which lets the model self-correct
      on its next turn. The reason is the same in both cases: the model is an untrusted caller, so you
      validate first and turn a bad call into a recoverable step rather than a crash.
    expect:
      verdict: pass
      checks: { addresses_question: true, covers_key_points: true, technically_correct: true, concrete: true }

  # FAIL — off-topic and technically wrong: says to run the closest tool and default
  # the missing field, and to crash on error. Fails the gate (technically_correct)
  # plus every other check. 0/4 = 0.0 → fail; gate false caps fail→fail.
  - answer: >-
      If the tool name is unknown the harness should just run whichever registered tool is closest, since
      the model clearly meant that one, and if a required field is missing it should fill in a sensible
      default so the call never fails. There is no need to send anything back to the model — if something
      still goes wrong the cleanest thing is to raise an exception and end the session so a human can look
      at it.
    expect:
      verdict: fail
      checks: { addresses_question: false, covers_key_points: false, technically_correct: false, concrete: false }

  # FAIL — replaces the former borderline case with a clear fail. Technically wrong and
  # off-substance: claims validation errors should never block a tool, so it silently
  # defaults a missing required field and runs the handler on garbage. Fails the gate
  # (technically_correct) and every other check. 0/4 = 0.0 → fail; gate false caps fail→fail.
  - answer: >-
      A missing required field should never actually block a tool from running, so the harness fills the
      field in with an empty string and calls the handler anyway — a validation error is just a warning. An
      unknown tool name is fine too: the harness runs whichever registered tool has the most similar name,
      since the model obviously meant that one. There's no need to send anything back to the model, and if a
      handler still throws the cleanest thing is to let the exception crash the loop.
    expect:
      verdict: fail
      checks: { addresses_question: false, covers_key_points: false, technically_correct: false, concrete: false }

  # PASS — third strong answer for the talk-vs-act / loop question. Correct, specific,
  # names mechanisms. 4/4 = 1.0 → pass; gate technically_correct=true.
  - answer: >-
      A model that only emits text is a chatbot; the moment it can request tools that a harness runs, it
      becomes an agent that acts on the world. The loop is driven by stop_reason: when the model returns
      stop_reason == "tool_use" with a tool_name and tool_input, the harness executes that tool and appends
      the output as a tool_result block in a user-role message, keyed by tool_use_id. It then calls the model
      again, and repeats until stop_reason == "end_turn", at which point the model's .text is the final
      answer. A step cap bounds the loop so a misbehaving model can't spin forever.
    expect:
      verdict: pass
      checks: { addresses_question: true, covers_key_points: true, technically_correct: true, concrete: true }

  # FAIL — third clear fail. Off-topic and technically wrong for the talk-vs-act question:
  # claims tool_use is the final answer (no loop), and that well-formed JSON is always correct.
  # Fails the gate plus every other check. 0/4 = 0.0 → fail; gate false caps fail→fail.
  - answer: >-
      There is no real difference between a chatbot and an agent — tool calling is just a longer prompt. When
      the model returns stop_reason == "tool_use" the turn is already finished and that block is the final
      answer, so there is no loop to run and nothing to feed back. Whatever JSON the model returns is
      correct as long as it parses, so validating fields is a waste of time and you can use the raw string
      directly.
    expect:
      verdict: fail
      checks: { addresses_question: false, covers_key_points: false, technically_correct: false, concrete: false }
