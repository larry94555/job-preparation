# Free entry (short answer)
- id: fe-trace
  type: text_input
  tags: [trace]
  difficulty: 1
  prompt: "What do you call the full per-step record of one agent run? (one word)"
  answer:
    regex: '^trace$'
    normalize: true

- id: fe-span
  type: text_input
  tags: [spans]
  difficulty: 1
  prompt: "What is the record of a single step inside a trace called? (one word)"
  answer:
    regex: '^span$'
    normalize: true

- id: fe-latency
  type: text_input
  tags: [spans]
  difficulty: 2
  prompt: "Which per-span metric measures how long a step took? (one word)"
