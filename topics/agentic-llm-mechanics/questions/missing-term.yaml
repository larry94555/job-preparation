# Missing term (cloze)
- id: cloze-context-window
  type: text_input
  tags: [context]
  difficulty: 1
  prompt: "The hard token limit for a single model call is its ____ window."
  answer:
    regex: '^context$'
    normalize: true

- id: cloze-token
  type: text_input
  tags: [tokens]
  difficulty: 1
  prompt: "Providers bill per ____, and the model generates them one at a time."
  answer:
    regex: '^tokens?$'
    normalize: true

- id: cloze-lost-middle
  type: text_input
  tags: [context]
  difficulty: 2
  prompt: "In a long context, a fact is most likely to be missed when placed in the ____."
  answer:
    regex: '^middle$'
    normalize: true

- id: cloze-routing
  type: text_input
  tags: [routing]
  difficulty: 2
  prompt: "Route simple, high-volume tasks to the ____ capable model that can still do them."
  answer:
    regex: '^(cheap|cheaper|cheapest)$'
    normalize: true

- id: cloze-hallucination
  type: text_input
  tags: [failure]
  difficulty: 2
  prompt: "Confident, fluent output that is not grounded in any real source is a ____."
  answer:
    regex: '^hallucination$'
    normalize: true

- id: cloze-drift
  type: text_input
  tags: [failure]
  difficulty: 2
  prompt: "The slow erosion of instruction-following over a long session is instruction ____."
  answer:
    regex: '^drift$'
    normalize: true
