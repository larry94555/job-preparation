# Frontier drill (L4) — the moving edge of model routing.
- id: frontier-routing
  type: multiple_choice
  tags: [routing]
  difficulty: 4
  prompt: >-
    Beyond a hand-written "if simple → cheap model" rule, where is the routing frontier moving,
    and what is the honest read?
  options:
    - { text: "Learned routers, model cascades, and confidence-based escalation (e.g. FrugalGPT) — send to the cheapest tier first and escalate only when confidence is low, but the router itself must be trained and evaluated and can misroute", correct: true }
    - { text: "It is fully solved: always send everything to the largest model, which is both cheapest and best" }
    - { text: "Routing is a latency problem only; a faster network removes the need to choose a tier" }
    - { text: "The frontier is to stop routing entirely because tiers no longer differ in price or quality" }
  explanation: >-
    The frontier moves from static rules to learned routing: a cascade tries a cheap model first and a
    confidence signal (or a trained router) decides whether to escalate to a stronger tier — the pattern
    popularized by FrugalGPT. It is a real cost/quality lever, not a solved problem: the router is itself a
    model that must be trained, calibrated, and evaluated, and it can misroute. Bigger-is-always-cheaper and
    "latency only" are wrong reads.

- id: frontier-effective-context
  type: multiple_choice
  tags: [context]
  difficulty: 4
  prompt: >-
    Windows have grown to hundreds of thousands (even millions) of tokens. Where is the long-context
    frontier actually moving, and what is the honest read for an agent engineer?
  options:
    - { text: "Toward effective-context evals — measuring reliable retrieval and reasoning at every position, not just whether content fits — because large windows still degrade mid-context; you evaluate long-context use, order by importance, and keep the budget tight rather than trusting the headline size", correct: true }
    - { text: "Toward ever-larger windows that make context engineering obsolete, since a big enough window uses every token uniformly" }
    - { text: "Toward removing tokenization, which is the sole cause of lost-in-the-middle" }
    - { text: "Nowhere: once a document fits in the window, retrieval position no longer affects accuracy" }
  explanation: >-
    Growing the window raises the ceiling on what fits but does not guarantee the model uses every position
    equally — the lost-in-the-middle effect persists at scale. The frontier is effective-context evaluation:
    benchmarks and harnesses that probe retrieval/reasoning across positions, plus continued context
    engineering (order by importance, retrieve the few most relevant passages, keep it tight). The honest read
    is that window size is necessary but not sufficient, so you measure effective use rather than assume it.
