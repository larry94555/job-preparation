# Sections group lessons and define the summative section assessments.
sections:
  - id: sec-taxonomy
    title: "Failure taxonomy: how structured output breaks"
    lessons: [lesson-roadmap-taxonomy, lesson-taxonomy]
    assessment:
      title: "Section 1 — Failure taxonomy"
      from_tags: [taxonomy]
      count: 4
      pass_threshold: 0.8

  - id: sec-validation
    title: "The validation contract & constrained decoding"
    lessons: [lesson-roadmap-validation, lesson-validation, lesson-expert-context]
    assessment:
      title: "Section 2 — Validation & constrained decoding"
      from_tags: [validation, constrained-decoding]
      count: 5
      pass_threshold: 0.8

  - id: sec-recovery
    title: "Recovery & operating the pipeline in production"
    lessons: [lesson-roadmap-recovery, lesson-repair-fallback, lesson-deep-dive, lesson-frontier-ops]
    assessment:
      title: "Section 3 — Recovery: repair & fallback"
      from_tags: [repair, fallback]
      count: 5
      pass_threshold: 0.8
