# Calibration for eval-rag-essay (exemplars target essay-hybrid-rerank).
# Gate = technically_correct. Verdict math: score = trueChecks/4; >=0.75 pass,
# >=0.5 borderline, else fail; a false gate caps down one level. Answers are kept
# short and plainly correct so a small grader reproduces each check reliably.
skill: eval-rag-essay
cases:
  # PASS — short, plainly-correct hybrid + rerank design. All four true -> pass.
  - answer: >-
      Run dense and sparse retrieval together. A dense bi-encoder captures paraphrase and semantic
      matches, while BM25 catches exact keywords, product IDs, and rare terms. Fuse the two ranked
      lists with Reciprocal Rank Fusion, which combines by rank position instead of mixing
      incomparable scores. Then rerank only the top candidates with a cross-encoder, which reads each
      query-document pair together for higher precision. Reranking just the shortlist keeps latency
      bounded while improving the final ordering.
    expect:
      verdict: pass
      checks: { addresses_question: true, covers_key_points: true, technically_correct: true, concrete: true }

  # PASS — second strong answer, still short and plainly correct. 4/4 = pass.
  - answer: >-
      Use hybrid retrieval: BM25 for exact lexical matches (rare tokens, codes, names) and a dense
      bi-encoder for semantic matches on paraphrases. Merge the two result sets with RRF so ranking
      does not depend on incomparable score scales, then apply a cross-encoder reranker to the top
      candidates for a precise final order. The cross-encoder is expensive because it attends over the
      full query-document pair, so cap it to a small shortlist to keep tail latency in check.
    expect:
      verdict: pass
      checks: { addresses_question: true, covers_key_points: true, technically_correct: true, concrete: true }

  # FAIL — vague and technically wrong (RRF "averages cosine scores"; cross-encoder "same as the
  # bi-encoder"; rerank the whole corpus "with no latency cost"). Low score + false gate -> fail.
  - answer: >-
      Just embed everything and do vector search, then average the cosine scores with the keyword
      scores to fuse them — that is basically what RRF does. A cross-encoder reranker is the same
      thing as the bi-encoder embeddings, so it does not really add precision, and you can rerank the
      entire corpus every query with no latency cost.
    expect:
      verdict: fail
      checks: { addresses_question: true, covers_key_points: false, technically_correct: false, concrete: false }

  # BORDERLINE — clearly on-topic, hits the key points, and is concrete, but contains ONE blatant false
  # claim (a cross-encoder is faster than first-stage retrieval, so rerank the whole corpus). Only the
  # gate is false -> 3/4 -> capped to borderline.
  - answer: >-
      Combine dense and sparse retrieval, fuse the two ranked lists with Reciprocal Rank Fusion, and
      rerank the top candidates with a cross-encoder while capping the shortlist to control latency.
      Dense and sparse cover different match types, RRF merges them by rank, and the cross-encoder
      lifts precision on the shortlist. One claim to rely on: a cross-encoder reranker is faster than
      the first-stage retriever, so you can just rerank the entire corpus on every query.
    expect:
      verdict: borderline
      checks: { addresses_question: true, covers_key_points: true, technically_correct: false, concrete: true }
