# Frontier drill (L4) — open problems in deploying agents.
- id: frontier-deploy
  type: multiple_choice
  tags: [rollout]
  difficulty: 4
  prompt: >-
    You want to ramp a new agent version automatically — 1% to 100% — gated on live metrics, with a pool
    of workers that grows and shrinks with the queue. Which named practice is this, and what is the honest
    read?
  options:
    - { text: "Progressive delivery with feature flags and autoscaling workers — an open problem for agents: what to gate the ramp on (agent quality isn't a simple error rate) and how to autoscale a spiky, expensive pool are unsolved", correct: true }
    - { text: "It is fully solved by turning on a green unit-test suite as the deploy gate" }
    - { text: "It is a networking problem; a faster load balancer makes the ramp safe" }
    - { text: "It is not a real problem — once the canary passes, ship to 100% with no metrics" }
  explanation: >-
    Progressive delivery generalizes the canary into an automated, metric-gated ramp behind feature flags,
    with worker pools autoscaling on queue depth. For agents it is a genuine frontier problem: agent quality
    is not a simple 500-rate, so what to gate the ramp on is unsolved, and autoscaling a pool whose per-job
    cost and duration vary wildly is hard. A green unit-test suite does not prove a version safe to widen.

- id: frontier-autoscale-workers
  type: multiple_choice
  tags: [ratelimit]
  difficulty: 4
  prompt: >-
    You autoscale the worker pool on queue depth so it grows and shrinks with load. For agent jobs this
    is genuinely hard in a way ordinary web work is not. What is the honest read on why, and the current
    best-effort stance?
  options:
    - { text: "Agent jobs have wildly variable duration and per-job token cost, so scaling on queue depth alone over- or under-provisions — you scale too eagerly and burn budget or too slowly and starve the queue; best effort is to scale on cost/concurrency-aware signals with guardrails, accepting it bounds the risk rather than solving it", correct: true }
    - { text: "It is fully solved: set one worker per queued job and the pool is always right-sized" }
    - { text: "It is a pure networking problem that a faster load balancer fixes" }
    - { text: "Autoscaling agent workers is unnecessary because agent load is perfectly steady" }
  explanation: >-
    Ordinary requests are cheap and roughly uniform, so queue depth is a fine autoscaling signal. Agent
    jobs are not: a run can take seconds or minutes and cost real tokens, so depth alone misleads —
    scaling eagerly burns budget, scaling slowly starves the queue. The honest stance is to scale on
    cost- and concurrency-aware signals with budget guardrails and admission control (rate limits) in
    front, while acknowledging that right-sizing a spiky, expensive pool remains an open operational problem.
