# Production stack (Phase 6 hosting) — the four tiers of DESIGN §§6/8/9 wired
# together: db (Postgres), web (Next.js), worker (grading pool), sandbox
# (isolated code execution). The dev docker-compose.yml (just `db`) is unchanged
# and remains the local-first path; this file is the full hosted stack.
#
# Bring up:  docker compose -f docker-compose.prod.yml --env-file secrets/prod.env up -d --build
# Env:       fill in secrets/prod.env (see WEBSITE_STEP_BY_STEP.md, Phase F). Run
#            `npm run db:push` (and `CONTENT=db npm run db:import`) once against the
#            db before the web/worker tiers serve traffic — see DEPLOY.md.
#
# NOTE: authored for Phase 6; images are built/pushed by deploy.yml, not here.
# The public front door (Caddy + HTTPS) is added in Phase F.4 of the step-by-step.

services:
  # ---- data tier ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobprep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobprep}
      POSTGRES_DB: ${POSTGRES_DB:-jobprep}
    volumes:
      - jobprep_pgdata:/var/lib/postgresql/data
    # Bind to localhost ONLY so the one-time setup commands (`db:push`, `db:import`)
    # can run from the VM shell, without exposing Postgres to the internet.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobprep} -d ${POSTGRES_DB:-jobprep}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- web tier (Next.js app) --------------------------------------------
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      # Hosted stack: Postgres store, DB content projection, DB job queue, and the
      # HTTP sandbox — never the local/file defaults.
      DATABASE_URL: ${DATABASE_URL:-postgres://jobprep:jobprep@db:5432/jobprep}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET (openssl rand -base64 32)}
      # Auth.js v5 canonical URL (behind Caddy). trustHost is on, but setting this
      # makes magic-link callback URLs correct.
      AUTH_URL: ${AUTH_URL:-}
      AUTH_ADMIN_EMAILS: ${AUTH_ADMIN_EMAILS:-}
      # Optional one-click OAuth — enabled only when both id+secret are set.
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      STORE: pg
      # Content is served from the topics/ tree baked into the web image (the
      # lesson runner reads material Markdown from disk at runtime). CONTENT=db is
      # NOT usable here: the projected topic.dir is an absolute path from the
      # import host that doesn't exist in the container.
      CONTENT: file
      TOPICS_DIR: /app/topics
      QUEUE: db
      SANDBOX: http
      SANDBOX_URL: http://sandbox:4500
      # Hosted grader config (read-only /models page); the web tier never grades,
      # so it needs the catalog path + DEPLOY_ENV but NOT the LLM credentials.
      DEPLOY_ENV: ${DEPLOY_ENV:-hosted}
      MODEL_CONFIG_PATH: ${MODEL_CONFIG_PATH:-/app/model_configuration.yaml}
      # Email magic-link sign-in (Resend). Without these the app falls back to a
      # "email sign-in not enabled" notice — set them for real registration.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
      # Support mailbox for the Help link + privacy/terms contact.
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@example.com}
      # Donations (Stripe). Without these, donation endpoints return a graceful
      # "not configured" response. STRIPE_WEBHOOK_SECRET is set after F.6.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PORT: "3000"
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      sandbox:
        condition: service_healthy

  # ---- worker tier (async grading pool) ----------------------------------
  # Scale with:  docker compose -f docker-compose.prod.yml up -d --scale worker=N
  # Each replica owns one llama-server slot; point LLM_BASE_URL at it.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://jobprep:jobprep@db:5432/jobprep}
      QUEUE: db
      # The worker also runs code (essay grading may exec) via the same HTTP sandbox.
      SANDBOX: http
      SANDBOX_URL: http://sandbox:4500
      # The grading tier IS the only one that talks to the LLM — so it holds the
      # Oracle key. NOTE: llama-server runs on the VM host, outside Docker, so
      # LLM_BASE_URL must use the VM's IP (not localhost/host.docker.internal on
      # Linux). LLM_API_KEY authenticates to it — without it, grading returns 401.
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8080/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-120000}
      MODEL_CONFIG_PATH: ${MODEL_CONFIG_PATH:-/app/model_configuration.yaml}
      DEPLOY_ENV: ${DEPLOY_ENV:-hosted}
      LLM_MODEL: ${LLM_MODEL:-local}
      LLM_BIG_MODEL: ${LLM_BIG_MODEL:-}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      sandbox:
        condition: service_healthy

  # ---- sandbox tier (isolated code execution) ----------------------------
  # The only tier facing untrusted code. In a real deploy this runs under
  # gVisor/Firecracker with no egress, dropped caps, read-only+ephemeral FS, and
  # resource limits (see services/sandbox/Dockerfile). No DB, no secrets.
  sandbox:
    build:
      context: .
      dockerfile: services/sandbox/Dockerfile
    environment:
      PORT: "4500"
      NODE_ENV: production
    # Defense-in-depth hints the orchestrator should enforce; gVisor/Firecracker
    # + a no-egress network are applied at the runtime layer, not expressible here.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:4500/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jobprep_pgdata:
